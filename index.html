<script>
  // LINK APPSCRIPT TERHUBUNG AKTIFF
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwSUCHwL7_QwROxMiwiC9-rUL9nNFd9KD_Qm-PhBWC3bI7Jv58rZnoj6StMb_w3hCa-/exec";

  let currentUser = null;
  let selectedMood = "😊";
  let mediaStream = null;
  let currentFilterGuru = "semua";
  let chartGuruObj = null;
  let chartSiswaObj = null;

  let targetJamBangun = "05:30";
  let targetJamTidur = "21:30";

  // DATABASE TEMPORARY (AKAN DIISIKAN DARI APPSCRIPT)
  let dbSiswa = [];
  let dbRiwayat = [];

  const quotes = [
    "Hari yang hebat dimulai dengan bangun lebih awal.",
    "Disiplin adalah kunci kesuksesan utama.",
    "Kebiasaan kecil hari ini menentukan masa depanmu."
  ];

  document.addEventListener("DOMContentLoaded", () => {
    initAutoGreeting();
    renderCalendar();
    registerPWA();
    startLiveClock();
    loadDataFromGAS(); // SINKRONISASI AWAL DARI DATABASE
  });

  // FUNGSI UTAMA: AMBIL DATA DARI GOOGLE APPS SCRIPT
  async function loadDataFromGAS() {
    showToast("🔄 Menyinkronkan data dari server...");
    try {
      const response = await fetch(`${GAS_API_URL}?action=read`);
      const resData = await response.json();
      
      if (resData.result === "success") {
        if (resData.siswa && resData.siswa.length > 0) dbSiswa = resData.siswa;
        if (resData.riwayat && resData.riwayat.length > 0) dbRiwayat = resData.riwayat;
        
        showToast("✅ Data berhasil diperbarui!");
        
        // Refresh Tampilan Jika Guru Sedang Login
        if (currentUser && currentUser.role === 'guru') {
          renderGuruDashboard();
        }
      }
    } catch (error) {
      console.error("Gagal mengambil data GAS:", error);
      showToast("⚠️ Menggunakan mode offline / lokal.");
    }
  }

  // FUNGSI UTAMA: KIRIM DATA KE GOOGLE APPS SCRIPT
  async function postDataToGAS(payload) {
    try {
      await fetch(GAS_API_URL, {
        method: "POST",
        mode: "no-cors", // Mencegah kendala CORS pada Apps Script
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      showToast("☁️ Tersimpan ke Google Sheets!");
    } catch (error) {
      console.error("Gagal mengirim ke GAS:", error);
      showToast("⚠️ Dikelola secara lokal (Gagal sync cloud).");
    }
  }

  function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");
  }

  function showToast(msg) {
    const toast = document.getElementById("toast");
    toast.innerText = msg;
    toast.classList.remove("hidden");
    setTimeout(() => toast.classList.add("hidden"), 3000);
  }

  function initAutoGreeting() {
    const hour = new Date().getHours();
    let greeting = "Selamat Pagi ☀️";
    if (hour >= 11 && hour < 15) greeting = "Selamat Siang 🌤️";
    else if (hour >= 15 && hour < 18) greeting = "Selamat Sore 🌅";
    else if (hour >= 18 || hour < 4) greeting = "Selamat Malam 🌙";

    document.getElementById("autoGreetingText").innerText = greeting;
    document.getElementById("quoteText").innerText = `"${quotes[Math.floor(Math.random() * quotes.length)]}"`;
  }

  function switchLogin(type) {
    if (type === 'siswa') {
      document.getElementById("formLoginSiswa").classList.remove("hidden");
      document.getElementById("formLoginGuru").classList.add("hidden");
      document.getElementById("tabSiswa").classList.add("active");
      document.getElementById("tabGuru").classList.remove("active");
    } else {
      document.getElementById("formLoginSiswa").classList.add("hidden");
      document.getElementById("formLoginGuru").classList.remove("hidden");
      document.getElementById("tabGuru").classList.add("active");
      document.getElementById("tabSiswa").classList.remove("active");
    }
  }

  function showPage(pageId) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    const target = document.getElementById(pageId);
    if (target) target.classList.add("active");

    if (pageId !== 'tidurCepatView' && pageId !== 'bangunPagiView') {
      stopCamera();
    }
  }

  function navTo(pageId, btnElem) {
    showPage(pageId);
    if (btnElem) {
      document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
      btnElem.classList.add("active");
    }
    if (pageId === 'tidurCepatView' || pageId === 'bangunPagiView') {
      startCamera(pageId === 'tidurCepatView' ? 'webcamVideo' : 'webcamVideoBangun');
    } else if (pageId === 'riwayatView') {
      renderRiwayat();
    } else if (pageId === 'rewardView') {
      renderLeaderboard('sekolah');
    }
  }

  function handleLoginSiswa(e) {
    e.preventDefault();
    const nama = document.getElementById("loginNama").value.trim();
    const fase = document.getElementById("loginFase").value;
    const kelas = document.getElementById("loginKelas").value.trim();

    const found = dbSiswa.find(s => 
      String(s.nama).toLowerCase() === nama.toLowerCase() && 
      String(s.kelas).toLowerCase() === kelas.toLowerCase()
    );

    if (!found) {
      showToast("❌ AKSE DIBA TANDAI: Nama / Kelas TIDAK ADA di database!");
      return;
    }

    currentUser = { ...found, role: 'siswa', fase: fase };

    document.getElementById("dashNama").innerText = currentUser.nama;
    document.getElementById("dashMeta").innerText = `Fase ${currentUser.fase} - Kelas ${currentUser.kelas} | Guru Wali: ${currentUser.guruWali || '-'}`;
    document.getElementById("profNama").value = currentUser.nama;
    document.getElementById("profKelas").value = `Fase ${currentUser.fase} - ${currentUser.kelas}`;
    document.getElementById("profGuru").value = currentUser.guruWali || '-';
    
    document.getElementById("wmNama").innerText = currentUser.nama;
    document.getElementById("wmKelas").innerText = currentUser.kelas;

    document.getElementById("bottomNav").classList.remove("hidden");
    showPage("dashboardSiswaView");
    initSiswaChart();
    showToast(`Selamat datang, ${currentUser.nama}! 🎉`);
  }

  function handleLoginGuru(e) {
    e.preventDefault();
    const namaGuru = document.getElementById("loginGuruNama").value.trim();
    
    if (!namaGuru) {
      showToast("⚠️ Masukkan Nama Guru Wali!");
      return;
    }

    currentUser = { role: 'guru', nama: namaGuru };
    document.getElementById("bottomNav").classList.add("hidden");
    showPage("dashboardGuruView");
    renderGuruDashboard();
    showToast(`Login Berhasil! Panel Guru Wali: ${namaGuru}`);
  }

  function logout() {
    stopCamera();
    currentUser = null;
    document.getElementById("bottomNav").classList.add("hidden");
    showPage("loginView");
    showToast("Anda telah keluar akun.");
  }

  function renderGuruDashboard() {
    if (!currentUser || currentUser.role !== 'guru') return;

    let myStudents = dbSiswa.filter(s => String(s.guruWali).toLowerCase() === currentUser.nama.toLowerCase());

    const total = myStudents.length;
    const bangun = myStudents.filter(s => s.status === "Sudah Bangun").length;
    const tidur = myStudents.filter(s => s.status === "Sudah Tidur").length;
    const terlambat = myStudents.filter(s => s.status === "Terlambat" || !s.status).length;

    document.getElementById("guruStatTotal").innerText = total;
    document.getElementById("guruStatBangun").innerText = bangun;
    document.getElementById("guruStatTidur").innerText = tidur;
    document.getElementById("guruStatTerlambat").innerText = terlambat;

    if (currentFilterGuru !== "semua") {
      myStudents = myStudents.filter(s => s.status === currentFilterGuru);
    }

    const tbody = document.getElementById("guruTabelSiswa");
    if (myStudents.length === 0) {
      tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:12px; color:var(--md-text-muted);">Tidak ada siswa binaan.</td></tr>`;
    } else {
      tbody.innerHTML = myStudents.map(s => `
        <tr style="border-bottom:1px solid var(--md-border);">
          <td style="padding:8px 6px;">
            <strong style="display:block; font-size:0.75rem;">${s.nama}</strong>
            <span style="font-size:0.65rem; color:var(--md-text-muted);">${s.kelas}</span>
          </td>
          <td style="padding:8px 6px; font-size:0.65rem;">
            🌅 ${s.jamBangun || '-'}<br>🌙 ${s.jamTidur || '-'}
          </td>
          <td style="padding:8px 6px;">
            <span class="status-pill ${s.status === 'Sudah Bangun' ? 'green' : s.status === 'Sudah Tidur' ? 'blue' : 'red'}">
              ${s.status || 'Belum Absen'}
            </span>
          </td>
          <td style="padding:8px 6px; text-align:center;">
            <button onclick="openEditSiswa(${s.id})" style="border:none; background:none; cursor:pointer; font-size:0.9rem; margin-right:4px;">✏️</button>
            <button onclick="deleteSiswa(${s.id})" style="border:none; background:none; cursor:pointer; font-size:0.9rem;">🗑️</button>
          </td>
        </tr>
      `).join("");
    }

    initGuruChart(bangun, tidur, terlambat);
  }

  function addSiswaSubmit(e) {
    e.preventDefault();
    const nama = document.getElementById("newNama").value.trim();
    const kelas = document.getElementById("newKelas").value.trim();

    if (!nama || !kelas) return;

    const payload = {
      action: "addSiswa",
      nama: nama,
      fase: "E",
      kelas: kelas,
      guruWali: currentUser.nama
    };

    dbSiswa.push({
      id: Date.now(),
      nama: nama,
      fase: "E",
      kelas: kelas,
      guruWali: currentUser.nama,
      totalPoin: 0,
      level: "🌱 Pemula",
      badge: "🥉 Bronze",
      status: "Belum Absen",
      jamBangun: "-",
      jamTidur: "-"
    });

    postDataToGAS(payload); // Sync ke Google Sheets

    closeModal("modalAddSiswa");
    document.getElementById("newNama").value = "";
    document.getElementById("newKelas").value = "";
    showToast("✅ Siswa baru ditambahkan & dikirim ke Cloud!");
    renderGuruDashboard();
  }

  function processCheckin(tipe) {
    const now = new Date();
    const timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) + " WIT";
    const dateStr = now.toISOString().split('T')[0];

    const checkinRecord = {
      tipe: tipe,
      waktu: timeStr,
      tanggal: dateStr,
      status: "Tepat Waktu",
      poin: 10,
      mood: selectedMood
    };

    dbRiwayat.unshift(checkinRecord);

    if (currentUser) {
      const idx = dbSiswa.findIndex(s => s.id === currentUser.id);
      if (idx !== -1) {
        dbSiswa[idx].status = `Sudah ${tipe}`;
        if (tipe === 'Bangun') dbSiswa[idx].jamBangun = timeStr;
        if (tipe === 'Tidur') dbSiswa[idx].jamTidur = timeStr;
        dbSiswa[idx].totalPoin = Number(dbSiswa[idx].totalPoin || 0) + 10;
      }

      // Sync ke Apps Script Database
      postDataToGAS({
        action: "checkin",
        nama: currentUser.nama,
        kelas: currentUser.kelas,
        tipe: tipe,
        waktu: timeStr,
        status: "Tepat Waktu",
        poin: 10,
        mood: selectedMood
      });
    }

    confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
    showToast(`🎉 Presensi ${tipe} Berhasil! (+10 Poin)`);
    navTo('dashboardSiswaView');
  }

  function openEditSiswa(id) {
    const siswa = dbSiswa.find(s => s.id === id && String(s.guruWali).toLowerCase() === currentUser.nama.toLowerCase());
    if (!siswa) return;

    document.getElementById("editSiswaId").value = siswa.id;
    document.getElementById("editNama").value = siswa.nama;
    document.getElementById("editKelas").value = siswa.kelas;
    openModal("modalEditSiswa");
  }

  function saveEditSiswaSubmit(e) {
    e.preventDefault();
    const id = parseInt(document.getElementById("editSiswaId").value);
    const nama = document.getElementById("editNama").value.trim();
    const kelas = document.getElementById("editKelas").value.trim();

    const index = dbSiswa.findIndex(s => s.id === id && String(s.guruWali).toLowerCase() === currentUser.nama.toLowerCase());
    if (index !== -1) {
      dbSiswa[index].nama = nama;
      dbSiswa[index].kelas = kelas;
      showToast("✅ Data siswa diperbarui!");
      renderGuruDashboard();
    }
    closeModal("modalEditSiswa");
  }

  function deleteSiswa(id) {
    if (!confirm("Apakah Anda yakin ingin menghapus siswa ini?")) return;

    const index = dbSiswa.findIndex(s => s.id === id && String(s.guruWali).toLowerCase() === currentUser.nama.toLowerCase());
    if (index !== -1) {
      dbSiswa.splice(index, 1);
      showToast("🗑️ Siswa berhasil dihapus!");
      renderGuruDashboard();
    } else {
      showToast("❌ Ditolak: Akses hapus tidak sah!");
    }
  }

  function filterGuruStatus(status) {
    currentFilterGuru = status;
    document.querySelectorAll("#fltAll, #fltBangun, #fltTidur, #fltTerlambat").forEach(b => b.classList.remove("active"));
    if (status === 'semua') document.getElementById("fltAll").classList.add("active");
    if (status === 'Sudah Bangun') document.getElementById("fltBangun").classList.add("active");
    if (status === 'Sudah Tidur') document.getElementById("fltTidur").classList.add("active");
    if (status === 'Terlambat') document.getElementById("fltTerlambat").classList.add("active");
    
    renderGuruDashboard();
  }

  function setMood(elem, mood) {
    document.querySelectorAll(".mood-item").forEach(m => m.classList.remove("active"));
    elem.classList.add("active");
    selectedMood = mood;
  }

  function startCamera(videoId) {
    stopCamera();
    const video = document.getElementById(videoId);
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
      navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => {
          mediaStream = stream;
          video.srcObject = stream;
        })
        .catch(err => console.log("Camera Error:", err));
    }
  }

  function stopCamera() {
    if (mediaStream) {
      mediaStream.getTracks().forEach(track => track.stop());
      mediaStream = null;
    }
  }

  function startLiveClock() {
    setInterval(() => {
      const el = document.getElementById("wmWaktu");
      if (el) {
        const now = new Date();
        el.innerText = `Waktu WIT Server: ${now.toLocaleTimeString('id-ID')} WIT`;
      }
    }, 1000);
  }

  function renderCalendar() {
    const grid = document.getElementById("calendarGrid");
    if (!grid) return;
    grid.innerHTML = "";
    
    const days = ["Mg", "Sn", "Sl", "Rb", "Km", "Jm", "Sb"];
    days.forEach(d => grid.innerHTML += `<div class="cal-day-head">${d}</div>`);

    for (let i = 1; i <= 31; i++) {
      let cls = "";
      if (i % 5 === 0) cls = "yellow";
      else if (i % 7 === 0) cls = "red";
      else if (i <= 21) cls = "green";

      grid.innerHTML += `<div class="cal-day ${cls}">${i}</div>`;
    }
  }

  function initSiswaChart() {
    const ctx = document.getElementById('chartSiswaProgress');
    if (!ctx) return;
    if (chartSiswaObj) chartSiswaObj.destroy();

    chartSiswaObj = new Chart(ctx, {
      type: 'line',
      data: {
        labels: ['Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab', 'Min'],
        datasets: [{
          label: 'Kedisiplinan (%)',
          data: [100, 100, 80, 100, 100, 90, 100],
          borderColor: '#10b981',
          tension: 0.3,
          fill: false
        }]
      },
      options: { responsive: true, plugins: { legend: { display: false } } }
    });
  }

  function initGuruChart(bangun, tidur, terlambat) {
    const ctx = document.getElementById('chartGuruKelas');
    if (!ctx) return;
    if (chartGuruObj) chartGuruObj.destroy();

    chartGuruObj = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['Sudah Bangun', 'Sudah Tidur', 'Terlambat/Belum'],
        datasets: [{
          data: [bangun, tidur, terlambat],
          backgroundColor: ['#10b981', '#2563eb', '#ef4444']
        }]
      },
      options: { responsive: true, maintainAspectRatio: false }
    });
  }

  function renderRiwayat() {
    const container = document.getElementById("riwayatContainer");
    if (!container) return;

    container.innerHTML = dbRiwayat.map(r => `
      <div style="display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid var(--md-border); font-size:0.75rem;">
        <div>
          <strong>${r.tipe === 'Bangun' ? '☀️ Bangun Pagi' : '🌙 Tidur Cepat'} ${r.mood || ''}</strong>
          <div style="font-size:0.68rem; color:var(--md-text-muted);">${r.tanggal || ''} - ${r.waktu || ''}</div>
        </div>
        <span style="color:#10b981; font-weight:800;">+${r.poin || 10} Poin</span>
      </div>
    `).join("");
  }

  function switchLeaderboard(type) {
    if (type === 'sekolah') {
      document.getElementById("btnLdSekolah").classList.add("active");
      document.getElementById("btnLdKelas").classList.remove("active");
    } else {
      document.getElementById("btnLdKelas").classList.add("active");
      document.getElementById("btnLdSekolah").classList.remove("active");
    }
    renderLeaderboard(type);
  }

  function renderLeaderboard(type) {
    const container = document.getElementById("leaderboardContainer");
    if (!container) return;

    let data = [...dbSiswa];
    if (type === 'kelas' && currentUser) {
      data = data.filter(s => s.kelas === currentUser.kelas);
    }

    data.sort((a, b) => (b.totalPoin || 0) - (a.totalPoin || 0));

    container.innerHTML = data.map((s, idx) => `
      <div style="display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid var(--md-border); font-size:0.78rem;">
        <div style="display:flex; align-items:center; gap:10px;">
          <span style="font-weight:800; width:20px;">#${idx + 1}</span>
          <div>
            <strong>${s.nama}</strong>
            <div style="font-size:0.68rem; color:var(--md-text-muted);">${s.kelas} | ${s.badge || '🥉 Bronze'}</div>
          </div>
        </div>
        <span style="font-weight:800; color:var(--md-primary);">${s.totalPoin || 0} Poin</span>
      </div>
    `).join("");
  }

  function openModal(id) { document.getElementById(id).classList.remove("hidden"); }
  function closeModal(id) { document.getElementById(id).classList.add("hidden"); }

  function saveConfigJam() {
    targetJamBangun = document.getElementById("setJamBangun").value;
    targetJamTidur = document.getElementById("setJamTidur").value;
    document.getElementById("cfgJamBangun").innerText = `${targetJamBangun} WIT`;
    document.getElementById("cfgJamTidur").innerText = `${targetJamTidur} WIT`;
    showToast("⚙️ Target waktu sekolah diperbarui!");
  }

  function sendBroadcastSubmit(e) {
    e.preventDefault();
    showToast("📢 Pengumuman berhasil dikirim ke siswa!");
    closeModal("modalPengumuman");
  }

  function exportExcel() {
    const myStudents = dbSiswa.filter(s => String(s.guruWali).toLowerCase() === currentUser.nama.toLowerCase());
    const ws = XLSX.utils.json_to_sheet(myStudents);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Presensi Siswa");
    XLSX.writeFile(wb, `Laporan_Presensi_${currentUser.nama}.xlsx`);
  }

  function exportPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.text(`Laporan Presensi Siswa Bimbingan: ${currentUser.nama}`, 10, 10);
    let y = 20;
    const myStudents = dbSiswa.filter(s => String(s.guruWali).toLowerCase() === currentUser.nama.toLowerCase());
    myStudents.forEach((s, i) => {
      doc.text(`${i + 1}. ${s.nama} (${s.kelas}) - Status: ${s.status || 'Belum Absen'}`, 10, y);
      y += 8;
    });
    doc.save(`Laporan_Presensi_${currentUser.nama}.pdf`);
  }

  function registerPWA() {
    if ('serviceWorker' in navigator) {
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        const btn = document.getElementById("installPwaBtn");
        if (btn) btn.classList.remove("hidden");
      });
    }
  }
</script>
