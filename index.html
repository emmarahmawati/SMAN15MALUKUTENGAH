<script>
  // ====================================================
  // KONFIGURASI API GOOGLE APPS SCRIPT
  // ====================================================
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwSUCHwL7_QwROxMiwiC9-rUL9nNFd9KD_Qm-PhBWC3bI7Jv58rZnoj6StMb_w3hCa-/exec";

  // State Global
  let currentUser = null;
  let dbSiswa = [];

  // FUNGSI PENGAMAN (Mencegah Layar Blank jika fungsi UI tidak ada)
  function safeShowToast(msg) {
    if (typeof showToast === "function") {
      showToast(msg);
    } else {
      console.log("[TOAST]:", msg);
      alert(msg); // Fallback jika showToast belum dibuat
    }
  }

  function safeSwitchPage(pageId) {
    if (typeof switchPage === "function") {
      switchPage(pageId);
    } else {
      console.log("[SWITCH PAGE]:", pageId);
    }
  }

  // ====================================================
  // 1. LOGIN SISWA (VALDIASI KETAT)
  // ====================================================
  async function handleLoginSiswa(e) {
    if (e) e.preventDefault();
    
    const elNama = document.getElementById("loginNama");
    const elFase = document.getElementById("loginFase");
    const elKelas = document.getElementById("loginKelas");

    if (!elNama || !elKelas) {
      safeShowToast("⚠️ Elemen Form Login tidak ditemukan!");
      return;
    }

    const namaInput = elNama.value.trim();
    const faseInput = elFase ? elFase.value : "E";
    const kelasInput = elKelas.value.trim();

    if (!namaInput || !kelasInput) {
      safeShowToast("⚠️ Mohon isi Nama dan Kelas!");
      return;
    }

    safeShowToast("⏳ Memeriksa data di database...");

    try {
      const response = await fetch(GAS_API_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "loginSiswa",
          payload: {
            nama: namaInput,
            fase: faseInput,
            kelas: kelasInput
          }
        })
      });

      const res = await response.json();

      if (res.success && res.siswa) {
        currentUser = {
          role: 'siswa',
          nama: res.siswa.nama,
          fase: res.siswa.fase || faseInput,
          kelas: res.siswa.kelas,
          guruWali: res.siswa.guruWali || "Belum Ditentukan",
          poin: res.siswa.totalPoin || 0,
          level: res.siswa.level || "🌱 Pemula",
          badge: res.siswa.badges || "🥉 Bronze"
        };

        // Safe DOM Updates
        if (document.getElementById("dashNama")) document.getElementById("dashNama").innerText = currentUser.nama;
        if (document.getElementById("dashMeta")) document.getElementById("dashMeta").innerText = `Fase ${currentUser.fase} - Kelas ${currentUser.kelas} | Guru Wali: ${currentUser.guruWali}`;
        if (document.getElementById("profNama")) document.getElementById("profNama").value = currentUser.nama;
        if (document.getElementById("profKelas")) document.getElementById("profKelas").value = `Fase ${currentUser.fase} - ${currentUser.kelas}`;
        if (document.getElementById("profGuru")) document.getElementById("profGuru").value = currentUser.guruWali;

        safeSwitchPage("dashboardSiswaView");
        if (document.getElementById("bottomNav")) document.getElementById("bottomNav").classList.remove("hidden");
        
        if (typeof initSiswaChart === "function") initSiswaChart();
        safeShowToast(`Selamat datang, ${currentUser.nama}! 🎉`);

      } else {
        // ❌ DITOLAK JIKA TIDAK ADA DI DATABASE
        safeShowToast("❌ Nama/Kelas tidak terdaftar! Hubungi Guru Wali Anda.");
      }

    } catch (err) {
      console.error("Login Error:", err);
      safeShowToast("❌ Gagal terhubung ke database server.");
    }
  }

  // ====================================================
  // 2. LOGIN GURU WALI & GET DATA REAL-TIME
  // ====================================================
  async function handleLoginGuru(e) {
    if (e) e.preventDefault();
    const elGuru = document.getElementById("loginGuruNama");
    const namaGuru = elGuru ? elGuru.value.trim() : "";

    if (!namaGuru) {
      safeShowToast("⚠️ Masukkan nama Guru Wali!");
      return;
    }

    currentUser = {
      role: 'guru',
      nama: namaGuru
    };

    safeSwitchPage("dashboardGuruView");
    if (document.getElementById("bottomNav")) document.getElementById("bottomNav").classList.add("hidden");

    await fetchSiswaFromGAS();
    safeShowToast(`Selamat datang, ${namaGuru}!`);
  }

  async function fetchSiswaFromGAS() {
    if (!currentUser || currentUser.role !== 'guru') return;

    safeShowToast("🔄 Memuat data siswa terbaru...");

    try {
      const response = await fetch(GAS_API_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "getSiswaByGuru",
          payload: { guruWali: currentUser.nama }
        })
      });

      const res = await response.json();

      if (res.success && Array.isArray(res.data)) {
        dbSiswa = res.data;
      } else {
        dbSiswa = [];
      }
      renderGuruDashboard();
    } catch (err) {
      console.error("Fetch Error:", err);
      renderGuruDashboard();
    }
  }

  // ====================================================
  // 3. TAMBAH SISWA BARU
  // ====================================================
  async function addSiswaSubmit(e) {
    if (e) e.preventDefault();
    const elNama = document.getElementById("newNama");
    const elKelas = document.getElementById("newKelas");
    const elFase = document.getElementById("newFase");

    const nama = elNama ? elNama.value.trim() : "";
    const kelas = elKelas ? elKelas.value.trim() : "";
    const fase = elFase ? elFase.value : "E";

    if (!nama || !kelas) {
      safeShowToast("⚠️ Lengkapi nama dan kelas!");
      return;
    }

    safeShowToast("⏳ Menyimpan siswa baru...");

    // Update lokal sementara
    const tempStudent = {
      id: Date.now(),
      nama: nama,
      kelas: kelas,
      fase: fase,
      guruWali: currentUser.nama,
      totalPoin: 0,
      level: "🌱 Pemula",
      badge: "🥉 Bronze",
      status: "Belum Absen",
      jamBangun: "-",
      jamTidur: "-"
    };
    dbSiswa.push(tempStudent);
    renderGuruDashboard();

    if (typeof closeModal === "function") closeModal("modalAddSiswa");
    if (elNama) elNama.value = "";
    if (elKelas) elKelas.value = "";

    try {
      const response = await fetch(GAS_API_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "tambahSiswa",
          payload: {
            nama: nama,
            kelas: kelas,
            fase: fase,
            guruWali: currentUser.nama
          }
        })
      });

      const res = await response.json();

      if (res.success) {
        safeShowToast("✅ Siswa berhasil ditambahkan!");
        await fetchSiswaFromGAS();
      } else {
        safeShowToast("❌ Gagal menyimpan ke server!");
      }

    } catch (err) {
      console.error("Add Student Error:", err);
      safeShowToast("⚠️ Terjadi kesalahan koneksi!");
    }
  }

  // ====================================================
  // 4. RENDER DASHBOARD GURU
  // ====================================================
  function renderGuruDashboard() {
    if (!currentUser || currentUser.role !== 'guru') return;

    const total = dbSiswa.length;
    const bangun = dbSiswa.filter(s => s.status === "Sudah Bangun").length;
    const tidur = dbSiswa.filter(s => s.status === "Sudah Tidur").length;
    const belum = dbSiswa.filter(s => s.status === "Belum Absen" || s.status === "Terlambat").length;

    if (document.getElementById("guruStatTotal")) document.getElementById("guruStatTotal").innerText = total;
    if (document.getElementById("guruStatBangun")) document.getElementById("guruStatBangun").innerText = bangun;
    if (document.getElementById("guruStatTidur")) document.getElementById("guruStatTidur").innerText = tidur;
    if (document.getElementById("guruStatTerlambat")) document.getElementById("guruStatTerlambat").innerText = belum;

    if (typeof renderGuruTable === "function") renderGuruTable(dbSiswa);
    if (typeof initGuruChart === "function") initGuruChart(bangun, tidur, belum);
  }
</script>
