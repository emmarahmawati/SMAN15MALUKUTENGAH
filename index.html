<script>
  // ====================================================
  // KONFIGURASI API GOOGLE APPS SCRIPT
  // ====================================================
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwSUCHwL7_QwROxMiwiC9-rUL9nNFd9KD_Qm-PhBWC3bI7Jv58rZnoj6StMb_w3hCa-/exec";

  // State Global
  let currentUser = null;
  let dbSiswa = [];

  // ====================================================
  // 1. PERBAIKAN: LOGIN SISWA (VALDIASI KETAT)
  // ====================================================
  async function handleLoginSiswa(e) {
    e.preventDefault();
    const namaInput = document.getElementById("loginNama").value.trim();
    const faseInput = document.getElementById("loginFase").value;
    const kelasInput = document.getElementById("loginKelas").value.trim();

    if (!namaInput || !kelasInput) {
      showToast("⚠️ Mohon isi Nama dan Kelas!");
      return;
    }

    showToast("⏳ Memeriksa data di database...");

    try {
      const response = await fetch(GAS_API_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "loginSiswa",
          payload: {
            nama: namaInput,
            fase: faseInput,
            kelas: kelasInput
          }
        })
      });

      const res = await response.json();

      // PERBAIKAN 1: Hanya meloloskan jika res.success TRUE & data siswa ditemukan
      if (res.success && res.siswa) {
        currentUser = {
          role: 'siswa',
          nama: res.siswa.nama,
          fase: res.siswa.fase || faseInput,
          kelas: res.siswa.kelas,
          guruWali: res.siswa.guruWali || "Belum Ditentukan",
          poin: res.siswa.totalPoin || 0,
          level: res.siswa.level || "🌱 Pemula",
          badge: res.siswa.badges || "🥉 Bronze"
        };

        // Update UI Tampilan Siswa
        document.getElementById("dashNama").innerText = currentUser.nama;
        document.getElementById("dashMeta").innerText = `Fase ${currentUser.fase} - Kelas ${currentUser.kelas} | Guru Wali: ${currentUser.guruWali}`;
        document.getElementById("profNama").value = currentUser.nama;
        document.getElementById("profKelas").value = `Fase ${currentUser.fase} - ${currentUser.kelas}`;
        document.getElementById("profGuru").value = currentUser.guruWali;

        switchPage("dashboardSiswaView");
        document.getElementById("bottomNav").classList.remove("hidden");
        initSiswaChart();
        showToast(`Selamat datang, ${currentUser.nama}! 🎉`);

      } else {
        // ❌ JIKA SISWA TIDAK ADA DI DATABASE GOOGLE SHEETS -> BLOKIR LOGIN
        showToast("❌ Nama/Kelas tidak terdaftar! Hubungi Guru Wali Anda.");
        return;
      }

    } catch (err) {
      console.error("Login Error:", err);
      showToast("❌ Gagal terhubung ke database. Cek koneksi internet.");
    }
  }

  // ====================================================
  // 2. LOGIN GURU WALI & SINKRONISASI DATA REAL-TIME
  // ====================================================
  async function handleLoginGuru(e) {
    e.preventDefault();
    const namaGuru = document.getElementById("loginGuruNama").value.trim();

    if (!namaGuru) {
      showToast("⚠️ Masukkan nama Guru Wali!");
      return;
    }

    currentUser = {
      role: 'guru',
      nama: namaGuru
    };

    switchPage("dashboardGuruView");
    document.getElementById("bottomNav").classList.add("hidden");

    // Ambil data siswa terbaru secara otomatis
    await fetchSiswaFromGAS();
    showToast(`Selamat datang, ${namaGuru}!`);
  }

  // FUNGSI MEMANGGIL DAFTAR SISWA DARI GOOGLE SHEETS
  async function fetchSiswaFromGAS() {
    if (!currentUser || currentUser.role !== 'guru') return;

    showToast("🔄 Memuat data siswa terbaru...");

    try {
      const response = await fetch(GAS_API_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "getSiswaByGuru",
          payload: { guruWali: currentUser.nama }
        })
      });

      const res = await response.json();

      if (res.success && Array.isArray(res.data)) {
        dbSiswa = res.data; // Sinkronkan data lokal dengan data server
        renderGuruDashboard();
      } else {
        dbSiswa = [];
        renderGuruDashboard();
      }
    } catch (err) {
      console.error("Fetch Error:", err);
      showToast("⚠️ Gagal memperbarui data dari server.");
      renderGuruDashboard();
    }
  }

  // ====================================================
  // 3. PERBAIKAN: TAMBAH SISWA (LANGSUNG TAMPIL + SINKRON)
  // ====================================================
  async function addSiswaSubmit(e) {
    e.preventDefault();
    const nama = document.getElementById("newNama").value.trim();
    const kelas = document.getElementById("newKelas").value.trim();
    const fase = document.getElementById("newFase") ? document.getElementById("newFase").value : "E";

    if (!nama || !kelas) {
      showToast("⚠️ Lengkapi nama dan kelas!");
      return;
    }

    showToast("⏳ Menyimpan siswa baru...");

    // 1. Tampilkan sementara di UI lokal agar responsif
    const tempStudent = {
      id: Date.now(),
      nama: nama,
      kelas: kelas,
      fase: fase,
      guruWali: currentUser.nama,
      totalPoin: 0,
      level: "🌱 Pemula",
      badge: "🥉 Bronze",
      status: "Belum Absen",
      jamBangun: "-",
      jamTidur: "-"
    };
    dbSiswa.push(tempStudent);
    renderGuruDashboard();

    // Reset Form & Tutup Modal
    closeModal("modalAddSiswa");
    document.getElementById("newNama").value = "";
    document.getElementById("newKelas").value = "";

    // 2. PERBAIKAN 2: Kirim ke Google Sheets lalu Panggil Ulang Data Segar
    try {
      const response = await fetch(GAS_API_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "tambahSiswa",
          payload: {
            nama: nama,
            kelas: kelas,
            fase: fase,
            guruWali: currentUser.nama
          }
        })
      });

      const res = await response.json();

      if (res.success) {
        showToast("✅ Siswa berhasil ditambahkan ke database!");
        // Refresh data langsung dari Google Sheets agar tersinkron sempurna
        await fetchSiswaFromGAS();
      } else {
        showToast("❌ Gagal menyimpan ke server: " + (res.message || "Error"));
      }

    } catch (err) {
      console.error("Add Student Error:", err);
      showToast("⚠️ Gagal terhubung ke database!");
    }
  }

  // ====================================================
  // 4. RENDER TAMPILAN DASHBOARD GURU
  // ====================================================
  function renderGuruDashboard() {
    if (!currentUser || currentUser.role !== 'guru') return;

    const total = dbSiswa.length;
    const bangun = dbSiswa.filter(s => s.status === "Sudah Bangun").length;
    const tidur = dbSiswa.filter(s => s.status === "Sudah Tidur").length;
    const belum = dbSiswa.filter(s => s.status === "Belum Absen" || s.status === "Terlambat").length;

    if (document.getElementById("guruStatTotal")) document.getElementById("guruStatTotal").innerText = total;
    if (document.getElementById("guruStatBangun")) document.getElementById("guruStatBangun").innerText = bangun;
    if (document.getElementById("guruStatTidur")) document.getElementById("guruStatTidur").innerText = tidur;
    if (document.getElementById("guruStatTerlambat")) document.getElementById("guruStatTerlambat").innerText = belum;

    // Panggil fungsi render tabel jika ada
    if (typeof renderGuruTable === "function") {
      renderGuruTable(dbSiswa);
    }
    
    // Panggil fungsi chart jika ada
    if (typeof initGuruChart === "function") {
      initGuruChart(bangun, tidur, belum);
    }
  }
</script>
